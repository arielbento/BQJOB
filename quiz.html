<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - Brusque</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Nunito', sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .slide {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #3ab5f5;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .rays {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.18) 0%, transparent 70%);
    z-index: 1;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 80px 50px;
    gap: 0;
  }

  .question-box {
    background: #DDF4FF;
    border-radius: 60px;
    padding: 28px 54px;
    display: flex;
    align-items: center;
    gap: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), inset 0 2px 0 rgba(255,255,255,0.7);
    max-width: 1000px;
    width: 100%;
    border: 4px solid rgba(255,255,255,0.5);
    margin-bottom: 80px;
  }

  .speaker-icon {
    font-size: 52px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }

  .question-text {
    font-size: 52px;
    font-weight: 900;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .options {
    display: flex;
    gap: 60px;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
  }

  .option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    cursor: pointer;
  }

  .option-card {
    width: 340px;
    height: 350px;
    border-radius: 36px;
    border: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    position: relative;
  }

  .option-card:hover {
    transform: translateY(-10px) scale(1.04);
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
  }

  .option-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 36px;
  }

  .option-label {
    background: white;
    border-radius: 50px;
    padding: 14px 52px;
    font-size: 40px;
    font-weight: 900;
    color: #1a1a1a;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.8);
    letter-spacing: 0.3px;
    border: 3px solid rgba(255,255,255,0.5);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="slide">
  <img class="bg" src="fundo.jpg" alt="fundo">
  <div class="rays"></div>

  <div class="content">
    <div class="question-box">
      <span class="speaker-icon">🔊</span>
      <span class="question-text">1) O que as fábricas de Brusque fazem muito?</span>
    </div>

    <div class="options">
      <div class="option">
        <div class="option-card">
          <img src="urso.png" alt="Brinquedo">
        </div>
        <div class="option-label">Brinquedo</div>
      </div>

      <div class="option">
        <div class="option-card">
          <img src="roupa.png" alt="Roupas">
        </div>
        <div class="option-label">Roupas</div>
      </div>

      <div class="option">
        <div class="option-card">
          <img src="doce.png" alt="Doces">
        </div>
        <div class="option-label">Doces</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
