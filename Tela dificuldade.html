<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Seleção de Dificuldade</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Nunito', "Comic Sans MS", sans-serif;
      text-decoration: none;
    }

    body {
      height: 100vh;
      background: url("assets/FundoTrue.png") center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      padding: 50px 60px;
      border-radius: 35px;
      border: 6px solid #ffd54f;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      text-align: center;
      z-index: 10;
      position: relative;
    }

    h1 {
      color: #49b300;
      font-size: 42px;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 3px 3px white;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 260px;
      padding: 18px;
      margin: 15px auto;
      border-radius: 25px;
      border: none;
      color: white;
      font-size: 26px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn:active {
      transform: translateY(6px);
      box-shadow: none !important;
    }

    .facil {
      background: #4CAF50;
      box-shadow: 0 8px 0 #388E3C;
    }

    .medio {
      background: #FF9800;
      box-shadow: 0 8px 0 #F57C00;
    }

    .dificil {
      background: #F44336;
      box-shadow: 0 8px 0 #D32F2F;
    }

    .voltar {
      position: absolute;
      top: 25px;
      left: 25px;
      padding: 12px 25px;
      border-radius: 20px;
      border: none;
      background: white;
      color: #555;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 6px 0 #ccc;
      cursor: pointer;
      transition: 0.1s;
      z-index: 20;
    }

    .voltar:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .personagem {
      position: absolute;
      bottom: -20px;
      right: -100px;
      width: 200px;
      pointer-events: none;
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
    }

    .parallax {
      position: absolute;
      pointer-events: none;
    }

    .sol {
      width: 180px;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    .balao {
      width: 140px;
      top: 90px;
      left: -20%;
      z-index: 3;
      animation: balaoLoop 70s linear infinite;
    }

    .nuvem {
      width: 220px;
      opacity: 0.95;
      z-index: 3;
      left: -35%;
      animation: nuvemLoop linear infinite;
    }

    .n1 {
      top: 40px;
      animation-duration: 45s;
      animation-delay: -5s;
    }

    .n2 {
      top: 120px;
      animation-duration: 55s;
      animation-delay: -18s;
    }

    .n3 {
      top: 220px;
      animation-duration: 60s;
      animation-delay: -32s;
    }

    .n4 {
      top: 70px;
      animation-duration: 48s;
      animation-delay: -12s;
    }

    .n5 {
      top: 180px;
      animation-duration: 52s;
      animation-delay: -26s;
    }

    @keyframes nuvemLoop {
      to {
        left: 110%;
      }
    }

    @keyframes balaoLoop {
      25% {
        transform: translateY(-20px);
      }

      50% {
        transform: translateY(0);
      }

      75% {
        transform: translateY(-15px);
      }

      100% {
        left: 110%;
      }
    }
  </style>
</head>

<body>
  <img src="assets/nuvem1.png" class="parallax nuvem n1" alt="Nuvem">
  <img src="assets/nuvem2.png" class="parallax nuvem n2" alt="Nuvem">
  <img src="assets/nuvem3.png" class="parallax nuvem n3" alt="Nuvem">
  <img src="assets/nuvem1.png" class="parallax nuvem n4" alt="Nuvem">
  <img src="assets/nuvem2.png" class="parallax nuvem n5" alt="Nuvem">
  <img src="assets/balao.png" class="parallax balao" alt="Balão">

  <a href="index.html"><button class="voltar">⬅ Voltar</button></a>

  <div class="container">
    <h1>Escolha o Nível</h1>

    <a href="facil.html"><button class="btn facil">🌟 Fácil</button></a>
    <a href="medio.html"><button class="btn medio">⭐⭐ Médio</button></a>
    <a href="dificil.html"><button class="btn dificil">🏆 Difícil</button></a>

    <img src="assets/Pensando.png" class="personagem" alt="Pinochio">
  </div>
</body>

</html>
