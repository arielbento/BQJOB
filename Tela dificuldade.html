<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Seleção de Dificuldade</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url("fundotrue.png") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      background: rgba(138, 134, 134, 0.2);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
    }

    h1 {
      margin-bottom: 30px;
      color: #333;
    }

    .btn {
      display: block;
      width: 200px;
      padding: 15px;
      margin: 10px auto;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      color: rgb(255, 255, 255);
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .dificil {
      background-color: #e74c3c; /* vermelho */
    }

    .medio {
      background-color: #16b3cf; /* verde */
    }

    .facil {
      background-color: #3498db; /* azul */
    }

    .voltar {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      background-color: #555;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .voltar:hover {
      background-color: #000000;
    }
  </style>
</head>

<body>
  <a href="index.html">
    <button class="voltar">← Voltar</button>
  </a>
  <div class="container">
    <h1>Escolha a dificuldade</h1>

    <a href="facil.html"> <button class="btn facil">Fácil</button> </a> 
    <a href="medio.html"> <button class="btn medio">Médio</button> </a> 
    <a href="dificil.html"><button class="btn dificil">Difícil</button> </a> 

  </div>

</body>
</html>
